<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Boletín de Seguridad</title>
  <link rel="stylesheet" href="css/styles.css">
</head>

<body>
  <header>
    <h1>Boletín de Seguridad</h1>
    <p class="subtitle">Resumen ejecutivo de ciberseguridad generado automáticamente</p>
  </header>

  <main id="contenido">
    <p>Cargando boletín...</p>
  </main>

  <script>
    fetch("content/boletin.html")
      .then(r => r.text())
      .then(html => document.getElementById("contenido").innerHTML = html)
      .catch(() => {
        document.getElementById("contenido").innerHTML =
          "<p>No se pudo cargar el boletín.</p>";
      });
  </script>
</body>
</html>
