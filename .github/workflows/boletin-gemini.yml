name: Boletin Seguridad Gemini

on:
  schedule:
    - cron: "0 6 * * *"
    - cron: "0 18 * * *"
  workflow_dispatch:

jobs:
  boletin:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Generar boletin con Gemini
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          PROMPT="Eres un analista experto en ciberseguridad. Realiza una búsqueda web actualizada en inglés y español sobre noticias globales de ciberseguridad, CVEs críticos del día, zero-days activos, ransomware y amenazas en curso, incidentes de vendors (Microsoft, Fortinet, Cisco, Palo Alto, VMware), alertas de CERTs, tendencias globales y vulnerabilidades explotadas activamente. Selecciona solo lo más relevante, resúmelo en español y genera un boletín HTML profesional con tarjetas y enlaces a las fuentes. No inventes información; usa solo lo que encuentres en la web. Devuelve solo HTML."

          RESPUESTA=$(curl -s -X POST \
            -H "Content-Type: application/json" \
            -H "x-goog-api-key: $GEMINI_API_KEY" \
            -d "{\"contents\":[{\"parts\":[{\"text\":\"$PROMPT\"}]}]}" \
            "https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-pro-latest:generateContent")

          mkdir -p content
          echo "$RESPUESTA" | jq -r '.candidates[0].content.parts[0].text' > content/boletin.html

      - name: Commit
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "actions@github.com"
          git add content/boletin.html
          git commit -m "Boletin actualizado" || echo "Sin cambios"
          git push
