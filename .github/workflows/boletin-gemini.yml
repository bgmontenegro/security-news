name: Boletin Seguridad Gemini

on:
  schedule:
    - cron: "0 6 * * *"
    - cron: "0 18 * * *"
  workflow_dispatch:

jobs:
  boletin:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Generar boletin con Gemini
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          PROMPT="Genera un boletín ejecutivo de ciberseguridad en ESPAÑOL como FRAGMENTO HTML. NO incluyas <!DOCTYPE>, <html>, <head>, <body> ni <style>. Usa únicamente estas clases CSS: section, section-title, grid, card, meta, links, tag, top. El bloque inicial debe ser <div class='top'> con título y fecha. El Resumen Ejecutivo NO debe ser texto: debe ser un <div class='grid'> con entre tres y seis tarjetas <div class='card'> que representen los eventos más críticos del momento. Prioriza exclusivamente información relacionada con estos productos y entornos: Fortinet (FortiOS, FortiGate, FortiAP, FortiMail), Proxmox, Dell iDRAC hasta generación 13, firmware de Dell Optiplex y Latitude, Windows XP, 7, 10 y 11, Windows Server 2003, 2008, 2012 y 2016, SQL Server Express 2005 y 2008, ESET Antivirus corporativo, Broadcast Electronics (equipos FM y automatización de radio), macOS desde 2015 en adelante, cámaras Dahua, Zabbix, Ubuntu, AlmaLinux, Red Hat Enterprise Linux 7 y 8, Zimbra 10. Ignora cualquier otro producto o tecnología. Cada tarjeta del resumen debe incluir producto afectado, tipo de evento (CVE, exploit activo, actualización, advisory), nivel de impacto (CRÍTICO o ALTO), acción recomendada inmediata y un bloque <div class='links'> con al menos una fuente oficial confiable. Las secciones posteriores deben ser <section class='section' id='incidentes'>, <section class='section' id='cves'>, <section class='section' id='ransomware'> y <section class='section' id='recomendaciones'>, cada una con <h3 class='section-title'>. Incidentes, CVEs y Ransomware deben usar <div class='grid'> con tarjetas <div class='card'>. Cada tarjeta debe incluir título claro, entre dos y cuatro puntos clave, una etiqueta visual de severidad usando <span class='tag'>CRÍTICO</span>, <span class='tag'>ALTO</span> o <span class='tag'>MEDIO</span>, una acción recomendada y un bloque <div class='links'>. Dentro de <div class='links'> incluye primero una fuente oficial como vendor, NVD, CERT o CISA y, solo si existe, un segundo enlace opcional a análisis o cobertura técnica de medios reconocidos como BleepingComputer, The Hacker News, Krebs on Security, Mandiant, Talos, Rapid7 o Unit42. No inventes fuentes. Si no existe una fuente confiable, escribe 'Fuente no confirmada' sin enlace. No uses markdown. No uses bloques de código. Devuelve únicamente el FRAGMENTO HTML. El Resumen Ejecutivo debe contener únicamente los cinco eventos más críticos del día, priorizando exploits activos, RCEs y vulnerabilidades con parche disponible."
          RESPUESTA=$(curl -s -X POST \
            -H "Content-Type: application/json" \
            -H "x-goog-api-key: $GEMINI_API_KEY" \
            -d "{\"contents\":[{\"parts\":[{\"text\":\"$PROMPT\"}]}]}" \
            "https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent")

          mkdir -p content
          echo "${RESPUESTA:-EMPTY_RESPONSE}" > content/raw.json

          TEXTO=$(echo "$RESPUESTA" | jq -r '.candidates[0].content.parts[0].text // empty')

          if [ -z "$TEXTO" ]; then
            echo "<div class='card'><h2>Boletín no disponible</h2><p>Gemini no devolvió contenido válido.</p></div>" > content/boletin.html
          else
            echo "$TEXTO" > content/boletin.html
          fi

      - name: Commit
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "actions@github.com"
          git add content/boletin.html content/raw.json
          git commit -m "Boletin actualizado" || echo "Sin cambios"
          git push
