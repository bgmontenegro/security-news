name: Boletin Seguridad Gemini

on:
  schedule:
    - cron: "0 6 * * *"
    - cron: "0 18 * * *"
  workflow_dispatch:

jobs:
  boletin:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Generar boletin con Gemini
        env:
          API_TOKEN: ${{ secrets.GEMINI_API_KEY }}
        run: |
          pip install requests
          python generar_boletin.py

      - name: Commit
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "actions@github.com"
          mkdir -p content/historico
          cp content/boletin.html content/historico/boletin-$(date +%Y-%m-%d).html
          git add content/boletin.html content/raw.json content/historico
          git commit -m "Boletin actualizado" || echo "Sin cambios"
          git push
