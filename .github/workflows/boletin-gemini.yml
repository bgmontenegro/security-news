name: Boletín de seguridad automático con Gemini (Web Search)

on:
  schedule:
    - cron: "0 6 * * *"   # 6 AM UTC
    - cron: "0 18 * * *"  # 6 PM UTC
  workflow_dispatch:

jobs:
  boletin:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Preparar prompt para Gemini
        run: |
          FECHA=$(date +"%d/%m/%Y %H:%M")

          cat > prompt.txt << 'EOF'
Eres un analista experto en ciberseguridad. Realiza una búsqueda web actualizada en inglés y español sobre:

- Noticias globales de ciberseguridad
- CVEs críticos del día
- Zero-days activos
- Ransomware y amenazas en curso
- Incidentes de vendors (Microsoft, Fortinet, Cisco, Palo Alto, VMware, etc.)
- Alertas de CERTs
- Tendencias globales
- Vulnerabilidades explotadas activamente

Tu tarea:

1. Buscar información reciente en la web (inglés y español).
2. Seleccionar solo lo más relevante.
3. Resumirlo en español.
4. Generar un boletín HTML profesional con tarjetas.
5. Incluir enlaces a las fuentes.
6. Mantener un tono claro, conciso y técnico.
7. No inventes información; usa solo lo que encuentres en la web.

Formato final: HTML limpio, sin <html> ni <body>, solo el contenido.
EOF

      - name: Llamar a Gemini con búsqueda web
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          PROMPT=$(sed 's/"/\\"/g' prompt.txt)

          RESPUESTA=$(curl -s -X POST \
            -H "Content-Type: application/json" \
            -H "x-goog-api-key: $GEMINI_API_KEY" \
            -d "{\"contents\":[{\"parts\":[{\"text\":\"$PROMPT\"}]}]}" \
            "https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-pro-latest:generateContent")

          echo "$RESPUESTA" | jq -r '.candidates[0].content.parts[0].text' > content/boletin.html

      - name: Commit cambios
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "actions@github.com"
          git add content/boletin.html
          git commit -m "Boletín automático actualizado" || echo "Sin cambios"
          git push
