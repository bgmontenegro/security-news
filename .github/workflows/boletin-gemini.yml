name: Boletín de seguridad automático con Gemini

on:
  schedule:
    - cron: "0 6 * * *"   # 6 AM UTC
    - cron: "0 18 * * *"  # 6 PM UTC
  workflow_dispatch:

jobs:
  boletin:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Instalar dependencias
        run: |
          sudo apt-get update
          sudo apt-get install -y curl jq

      - name: Obtener noticias RSS reales
        run: |
          mkdir rss

          curl -s https://www.fortiguard.com/rss/ir.xml > rss/fortinet.xml
          curl -s https://msrc.microsoft.com/update-guide/rss > rss/msrc.xml
          curl -s https://www.cisa.gov/cybersecurity-advisories/all.xml > rss/cisa.xml
          curl -s https://cert.europa.eu/publications/security-advisories.xml > rss/certeu.xml
          curl -s https://ubuntu.com/security/notices/rss.xml > rss/ubuntu.xml
          curl -s https://access.redhat.com/security/updates/advisory/rss.xml > rss/redhat.xml
          curl -s https://support.zabbix.com/plugins/servlet/feeds/notifications/rss > rss/zabbix.xml

      - name: Convertir RSS a JSON
        run: |
          jq -Rs '
            split("<item>") | .[1:] |
            map({
              title: (split("<title>")[1] | split("</title>")[0]),
              link: (split("<link>")[1] | split("</link>")[0]),
              description: (split("<description>")[1] | split("</description>")[0])
            })
          ' rss/fortinet.xml > fortinet.json

          jq -Rs '
            split("<item>") | .[1:] |
            map({
              title: (split("<title>")[1] | split("</title>")[0]),
              link: (split("<link>")[1] | split("</link>")[0]),
              description: (split("<description>")[1] | split("</description>")[0])
            })
          ' rss/msrc.xml > msrc.json

          jq -Rs '
            split("<item>") | .[1:] |
            map({
              title: (split("<title>")[1] | split("</title>")[0]),
              link: (split("<link>")[1] | split("</link>")[0]),
              description: (split("<description>")[1] | split("</description>")[0])
            })
          ' rss/cisa.xml > cisa.json

          jq -Rs '
            split("<item>") | .[1:] |
            map({
              title: (split("<title>")[1] | split("</title>")[0]),
              link: (split("<link>")[1] | split("</link>")[0]),
              description: (split("<description>")[1] | split("</description>")[0])
            })
          ' rss/certeu.xml > certeu.json

          jq -Rs '
            split("<item>") | .[1:] |
            map({
              title: (split("<title>")[1] | split("</title>")[0]),
              link: (split("<link>")[1] | split("</link>")[0]),
              description: (split("<description>")[1] | split("</description>")[0])
            })
          ' rss/ubuntu.xml > ubuntu.json

          jq -Rs '
            split("<item>") | .[1:] |
            map({
              title: (split("<title>")[1] | split("</title>")[0]),
              link: (split("<link>")[1] | split("</link>")[0]),
              description: (split("<description>")[1] | split("</description>")[0])
            })
          ' rss/redhat.xml > redhat.json

          jq -Rs '
            split("<item>") | .[1:] |
            map({
              title: (split("<title>")[1] | split("</title>")[0]),
              link: (split("<link>")[1] | split("</link>")[0]),
              description: (split("<description>")[1] | split("</description>")[0])
            })
          ' rss/zabbix.xml > zabbix.json

      - name: Unir todas las noticias
        run: |
          jq -s 'add' fortinet.json msrc.json cisa.json certeu.json ubuntu.json redhat.json zabbix.json > noticias.json

      - name: Generar boletín con Gemini
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          FECHA=$(date +"%d/%m/%Y %H:%M")

          PROMPT=$(cat <<EOF
Eres un analista de ciberseguridad. Recibirás un JSON con noticias reales de seguridad.
Tu tarea:
1. Leer todas las noticias.
2. Seleccionar las más relevantes.
3. Resumirlas en español.
4. Formatearlas en HTML con estilo de tarjetas.
5. Incluir enlaces a las fuentes.
6. Mantener un tono profesional.

JSON de entrada:
$(cat noticias.json)
EOF
)

          curl -s -X POST \
            -H "Content-Type: application/json" \
            -H "x-goog-api-key: $GEMINI_API_KEY" \
            -d "{\"contents\":[{\"parts\":[{\"text\":\"$PROMPT\"}]}]}" \
            https://generativelanguage.googleapis.com/v1beta/models/gemini-pro:generateContent \
            | jq -r '.candidates[0].content.parts[0].text' > content/boletin.html

      - name: Commit cambios
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "actions@github.com"
          git add content/boletin.html
          git commit -m "Boletín automático actualizado" || echo "Sin cambios"
          git push
