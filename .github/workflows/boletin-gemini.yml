name: Boletin Seguridad Gemini

on:
  schedule:
    - cron: "0 6 * * *"
    - cron: "0 18 * * *"
  workflow_dispatch:

jobs:
  boletin:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Generar boletin con Gemini
        env:
          API_TOKEN: ${{ secrets.GEMINI_API_KEY }}
        run: |
          pip install requests
          python generar_boletin.py
          
      - name: Mostrar contenido de content/ en logs (debug)
        if: always()
        run: |
            echo "=== LISTADO content ==="
            ls -la content || echo "No existe carpeta content"
            echo "=== HEAD raw.json (si existe) ==="
            if [ -f content/raw.json ]; then head -c 2000 content/raw.json || true; else echo "raw.json no existe"; fi echo "=== HEAD api_error_response.json (si existe) ==="
            if [ -f content/api_error_response.json ]; then head -c 2000 content/api_error_response.json || true; else echo "api_error_response.json no existe"; fi

      - name: Subir carpeta content como artefacto
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: boletin-content
          path: content

      - name: Commit
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "actions@github.com"

          mkdir -p content/historico
          FECHA=$(date +%Y-%m-%d)
          cp content/boletin.html content/historico/boletin-$FECHA.html

          echo "<!DOCTYPE html><html lang='es'><head><meta charset='UTF-8'><title>Histórico</title><link rel='stylesheet' href='../../css/styles.css'></head><body><div class='wrap'>  <div class='top'>    <h2>Histórico de Boletines</h2>    <p class='meta'><a href='../../index.html' style='color:#60a5fa;text-decoration:none;'>← Volver al boletín actual</a></p>  </div>  <div class='section'>    <h3 class='section-title'>Boletines Generados</h3>    <div class='grid'>" > content/historico/index.html
          for f in content/historico/boletin-*.html; do
            b=$(basename "$f")
            FECHA=$(echo "$b" | sed 's/boletin-\(.*\)\.html/\1/')
            echo "<div class='card'>
                    <h3>Boletín del $FECHA</h3>
                    <p class='meta'>Archivo: $b</p>
                    <div class='links'>
                      <a href='../../index.html?historico=$FECHA'>Abrir boletín</a>
                    </div>
                  </div>" >> content/historico/index.html
          done
          echo "    </div>  </div></div></body></html>" >> content/historico/index.html

          git add content/boletin.html content/historico
          git commit -m "Boletin actualizado" || echo "Sin cambios"
          git push
