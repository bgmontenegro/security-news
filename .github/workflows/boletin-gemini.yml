name: Boletin Seguridad Gemini

on:
  schedule:
    - cron: "0 6 * * *"
    - cron: "0 18 * * *"
  workflow_dispatch:

jobs:
  boletin:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Generar boletin con Gemini
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          PROMPT="Genera un boletín ejecutivo de ciberseguridad en ESPAÑOL como FRAGMENTO HTML. NO incluyas <!DOCTYPE>, <html>, <head>, <body> ni <style>. Usa únicamente estas clases CSS: section, section-title, grid, card, meta, links, tag, top. Estructura obligatoria: Un bloque <div class='top'> con título y fecha. Secciones separadas con <section class='section' id='resumen'>, <section class='section' id='incidentes'>, <section class='section' id='cves'>, <section class='section' id='ransomware'> y <section class='section' id='recomendaciones'>. Cada sección debe tener un encabezado <h3 class='section-title'>. Formato: Incidentes, CVEs y Ransomware deben usar <div class='grid'> con tarjetas <div class='card'>. Cada tarjeta debe incluir un título claro, entre dos y cuatro puntos clave y un bloque <div class='links'> con al menos un enlace <a href='URL'>Fuente</a>. Reglas: No inventes fuentes. Si no hay fuente confiable, escribe 'Fuente no confirmada' sin enlace. No uses markdown. No uses bloques de código. Devuelve únicamente el FRAGMENTO HTML."
          RESPUESTA=$(curl -s -X POST \
            -H "Content-Type: application/json" \
            -H "x-goog-api-key: $GEMINI_API_KEY" \
            -d "{\"contents\":[{\"parts\":[{\"text\":\"$PROMPT\"}]}]}" \
            "https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent")

          mkdir -p content
          echo "${RESPUESTA:-EMPTY_RESPONSE}" > content/raw.json

          TEXTO=$(echo "$RESPUESTA" | jq -r '.candidates[0].content.parts[0].text // empty')

          if [ -z "$TEXTO" ]; then
            echo "<div class='card'><h2>Boletín no disponible</h2><p>Gemini no devolvió contenido válido.</p></div>" > content/boletin.html
          else
            echo "$TEXTO" > content/boletin.html
          fi

      - name: Commit
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "actions@github.com"
          git add content/boletin.html content/raw.json
          git commit -m "Boletin actualizado" || echo "Sin cambios"
          git push
