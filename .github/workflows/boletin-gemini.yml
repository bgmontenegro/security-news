name: Boletin Seguridad Gemini

on:
  schedule:
    - cron: "0 6 * * *"
    - cron: "0 18 * * *"
  workflow_dispatch:

jobs:
  boletin:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Generar boletin con Gemini
        env:
          API_TOKEN: ${{ secrets.GEMINI_API_KEY }}
        run: |
          pip install requests
          python generar_boletin.py

      - name: Commit
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "actions@github.com"

          mkdir -p content/historico
          FECHA=$(date +%Y-%m-%d)
          cp content/boletin.html content/historico/boletin-$FECHA.html

          echo "<!DOCTYPE html><html lang='es'><head><meta charset='UTF-8'><title>Histórico</title><link rel='stylesheet' href='../../css/styles.css'></head><body><div class='wrap'>  <div class='top'>    <h2>Histórico de Boletines</h2>    <p><a href='../../index.html' style='color:#60a5fa;text-decoration:none;'>← Volver al boletín actual</a></p>  </div>  <ul>" > content/historico/index.html
          for f in content/historico/boletin-*.html; do
            b=$(basename "$f")
            echo "<li><a href='$b'>$b</a></li>" >> content/historico/index.html
          done
          echo "</ul></div></body></html>" >> content/historico/index.html

          git add content/boletin.html content/raw.json content/historico
          git commit -m "Boletin actualizado" || echo "Sin cambios"
          git push
