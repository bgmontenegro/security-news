name: Boletin Seguridad Gemini

on:
  schedule:
    - cron: "0 6 * * *"
    - cron: "0 18 * * *"
  workflow_dispatch:

jobs:
  boletin:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Generar boletin con Gemini
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          PROMPT="Eres un analista experto en ciberseguridad. Genera un boletín ejecutivo en HTML con tarjetas (<div class='card'>). Incluye estas secciones: Resumen Ejecutivo, Principales Incidentes, Vulnerabilidades Críticas (CVEs), Ransomware y Amenazas Activas, Recomendaciones. Usa solo información reciente y confiable. Devuelve únicamente HTML."

          RESPUESTA=$(curl -s -X POST \
            -H "Content-Type: application/json" \
            -H "x-goog-api-key: $GEMINI_API_KEY" \
            -d "{\"contents\":[{\"parts\":[{\"text\":\"$PROMPT\"}]}]}" \
            "https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent")

          mkdir -p content
          echo "${RESPUESTA:-EMPTY_RESPONSE}" > content/raw.json

          TEXTO=$(echo "$RESPUESTA" | jq -r '.candidates[0].content.parts[0].text // empty')

          if [ -z "$TEXTO" ]; then
            echo "<div class='card'><h2>Boletín no disponible</h2><p>Gemini no devolvió contenido válido.</p></div>" > content/boletin.html
          else
            echo "$TEXTO" > content/boletin.html
          fi

      - name: Commit
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "actions@github.com"
          git add content/boletin.html content/raw.json
          git commit -m "Boletin actualizado" || echo "Sin cambios"
          git push
